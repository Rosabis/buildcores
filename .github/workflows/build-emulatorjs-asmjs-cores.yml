name: build emulatorjs asmjs cores

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-emulatorjs-asmjs-cores.yml

permissions:
  contents: read

concurrency:
  group: build-emulatorjs-asmjs-cores-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover-cores:
    name: discover emulatorjs cores
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.cores.outputs.matrix }}
      skipped: ${{ steps.cores.outputs.skipped }}
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          repository: EmulatorJS/build
          ref: main
          path: emulatorjs-build

      - name: Generate core matrix
        id: cores
        working-directory: emulatorjs-build
        run: |
          unsupported='["melonds","mupen64plus_next","yabause","pcsx_rearmed","mednafen_psx_hw","parallel_n64","same_cdi"]'
          matrix="$(jq -c --argjson unsupported "$unsupported" '{include: [.[] | select(.options.requireThreads != true) | select((.name as $name | $unsupported | index($name)) | not) | {core: .name}]}' cores.json)"
          skipped="$(jq -r --argjson unsupported "$unsupported" '[.[] | select(.options.requireThreads == true or (.name as $name | $unsupported | index($name))) | .name] | join(",")' cores.json)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "skipped=$skipped" >> "$GITHUB_OUTPUT"
          echo "Asm.js candidates:"
          echo "$matrix" | jq -r '.include[].core'
          if [ -n "$skipped" ]; then
            echo "Skipped thread-only cores: $skipped"
          fi

  build-core:
    name: build ${{ matrix.core }}
    needs: discover-cores
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.discover-cores.outputs.matrix) }}

    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          repository: EmulatorJS/build
          ref: main
          path: emulatorjs-build

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-mips-linux-gnu \
            build-essential \
            cmake \
            curl \
            gpg \
            jq \
            libsdl2-dev \
            p7zip-full \
            pkgconf \
            python3 \
            wget \
            zip \
            zlib1g-dev

      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: emulatorjs-build/.emsdk
          key: emsdk-${{ runner.os }}-latest

      - name: Setup emscripten
        working-directory: emulatorjs-build
        run: |
          if [ ! -d .emsdk ]; then
            git clone https://github.com/emscripten-core/emsdk.git .emsdk
          fi
          ./.emsdk/emsdk install latest
          ./.emsdk/emsdk activate latest

      - name: Prepare emscripten ports
        working-directory: emulatorjs-build
        run: |
          source ./.emsdk/emsdk_env.sh
          embuilder build zlib

      - name: Patch EmulatorJS build scripts for asm.js
        working-directory: emulatorjs-build
        run: |
          cat > patch-build.py <<'PY'
          from pathlib import Path
          path = Path('build.sh')
          text = path.read_text()
          text = text.replace('cd "$outPath"\n    rm -f *.bc', 'cd "$buildPath/RetroArch"\n    python3 ../../patch-asmjs.py\n    cd "$outPath"\n    rm -f *.bc')
          text = text.replace('        buildThreads\n        if [ "$requiresWebgl2" = false ]; then\n            buildThreadsLegacy\n        fi', '        true')
          text = text.replace('            mv core-temp/threads/*.bc ./\n            emmake ./build-emulatorjs.sh --clean --threads >> "$logPath/$name-emake.log"\n            rm -f *.bc\n            if [ "$requiresWebgl2" = false ]; then\n                mv core-temp/legacyThreads/*.bc ./\n                emmake ./build-emulatorjs.sh --clean --threads --legacy >> "$logPath/$name-emake.log"\n                rm -f *.bc\n            fi', '')
          text = text.replace('$name-wasm.data', '$name-asmjs.data')
          text = text.replace('$name-legacy-wasm.data', '$name-legacy-asmjs.data')
          text = text.replace('buildThreads() {', 'buildThreads() {\n    return 0\n}\nunused_buildThreads() {')
          text = text.replace('buildThreadsLegacy() {', 'buildThreadsLegacy() {\n    return 0\n}\nunused_buildThreadsLegacy() {')
          text = text.replace('$name-thread-wasm.data', '$name-thread-asmjs.data')
          text = text.replace('$name-thread-legacy-wasm.data', '$name-thread-legacy-asmjs.data')
          text = text.replace('$name-thread*wasm.data', '$name-thread*asmjs.data')
          text = text.replace('$name-wasm.data $name-legacy-wasm.data', '$name-asmjs.data $name-legacy-asmjs.data')
          text = text.replace('zip $outputPath/$name.zip $name-thread*asmjs.data\n        if [ $requireThreads = false ]; then\n            zip -u $outputPath/$name.zip  $name-asmjs.data $name-legacy-asmjs.data\n        fi', 'if [ $requireThreads = false ]; then\n            zip $outputPath/$name.zip $name-asmjs.data $name-legacy-asmjs.data\n        fi')
          path.write_text(text)
          PY
          cat > patch-asmjs.py <<'PY'
          from pathlib import Path
          makefile = Path('Makefile.emulatorjs')
          text = makefile.read_text()
          text = text.replace('-s ENVIRONMENT=web,worker -s WASM_BIGINT=1 \\', '-s ENVIRONMENT=web,worker -s WASM=0 \\')
          makefile.write_text(text)
          script = Path('emulatorjs/build-emulatorjs.sh')
          text = script.read_text()
          text = text.replace('  wasm=1', '  wasm=0')
          text = text.replace('  out_name="${out_name}-wasm.data"', '  out_name="${out_name}-asmjs.data"')
          text = text.replace('    7z a ${out_dir}/${out_name} ../${name}_libretro.js.mem ../${name}_*.js', '    7z a ${out_dir}/${out_name} ../${name}_*.js ../${name}_libretro.js.mem')
          script.write_text(text)
          PY
          python3 patch-build.py

      - name: Build asm.js core
        working-directory: emulatorjs-build
        env:
          EMCC_CFLAGS: -sUSE_ZLIB=1
          EMCC_CXXFLAGS: -sUSE_ZLIB=1
        run: |
          source ./.emsdk/emsdk_env.sh
          bash build.sh --core=${{ matrix.core }}

      - name: Collect asm.js artifacts
        working-directory: emulatorjs-build
        run: |
          mkdir -p asmjs-artifacts/${{ matrix.core }}
          echo "Files in output:"
          find output -maxdepth 2 -type f -print | sort || true
          echo "Files in EmulatorJS/data/cores:"
          find compile/EmulatorJS/data/cores -maxdepth 1 -type f -print | sort || true
          core_files="$(find output compile/EmulatorJS/data/cores -maxdepth 2 -type f \( \
            -name '${{ matrix.core }}.zip' -o \
            -name '${{ matrix.core }}-asmjs.data' -o \
            -name '${{ matrix.core }}-legacy-asmjs.data' \
          \) -print 2>/dev/null | sort -u)"
          if [ -z "$core_files" ]; then
            echo "No compiled core artifacts were found for ${{ matrix.core }}"
            if [ -d output/logs ]; then
              echo "Compile log tail:"
              tail -n 120 output/logs/${{ matrix.core }}-compile.log 2>/dev/null || true
              echo "Emake log tail:"
              tail -n 160 output/logs/${{ matrix.core }}-emake.log 2>/dev/null || true
            fi
            exit 1
          fi
          while IFS= read -r file; do
            cp "$file" asmjs-artifacts/${{ matrix.core }}/
          done <<EOF
          $core_files
          EOF
          if [ -d output/logs ]; then
            mkdir -p asmjs-artifacts/${{ matrix.core }}/logs
            cp output/logs/${{ matrix.core }}-* asmjs-artifacts/${{ matrix.core }}/logs/ 2>/dev/null || true
          fi
          if [ -d output/reports ]; then
            mkdir -p asmjs-artifacts/${{ matrix.core }}/reports
            cp output/reports/${{ matrix.core }}.json asmjs-artifacts/${{ matrix.core }}/reports/ 2>/dev/null || true
          fi
          find asmjs-artifacts/${{ matrix.core }} -maxdepth 1 -type f \( -name '*.zip' -o -name '*.data' \) | grep -q .

      - name: Upload core artifact
        uses: actions/upload-artifact@v4
        with:
          name: emulatorjs-asmjs-${{ matrix.core }}
          path: emulatorjs-build/asmjs-artifacts/${{ matrix.core }}
          if-no-files-found: error
          retention-days: 14
