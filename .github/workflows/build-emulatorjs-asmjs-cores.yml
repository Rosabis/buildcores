name: build emulatorjs asmjs cores

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-emulatorjs-asmjs-cores.yml

permissions:
  contents: read

concurrency:
  group: build-emulatorjs-asmjs-cores-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-core:
    name: build ${{ matrix.platform }} (${{ matrix.core }})
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: psp
            core: ppsspp
          - platform: gba
            core: mgba
          - platform: nds
            core: melonds
          - platform: nds
            core: desmume2015
          - platform: nds
            core: desmume
          - platform: gb
            core: gambatte
          - platform: gbc
            core: gambatte
          - platform: md
            core: genesis_plus_gx
          - platform: md
            core: genesis_plus_gx_wide
          - platform: wsc
            core: mednafen_wswan
          - platform: ps1
            core: pcsx_rearmed
          - platform: ps1
            core: mednafen_psx_hw
          - platform: ss
            core: yabause
          - platform: dos
            core: dosbox_pure
          - platform: sfc
            core: snes9x
          - platform: sfc
            core: bsnes
          - platform: fc
            core: fceumm
          - platform: fc
            core: nestopia
          - platform: n64
            core: mupen64plus_next

    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          repository: EmulatorJS/build
          ref: main
          path: emulatorjs-build

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-mips-linux-gnu \
            build-essential \
            cmake \
            curl \
            gpg \
            jq \
            libsdl2-dev \
            p7zip-full \
            pkgconf \
            python3 \
            wget \
            zip \
            zlib1g-dev

      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: emulatorjs-build/.emsdk
          key: emsdk-${{ runner.os }}-latest

      - name: Setup emscripten
        working-directory: emulatorjs-build
        run: |
          if [ ! -d .emsdk ]; then
            git clone https://github.com/emscripten-core/emsdk.git .emsdk
          fi
          ./.emsdk/emsdk install latest
          ./.emsdk/emsdk activate latest

      - name: Prepare emscripten ports
        working-directory: emulatorjs-build
        run: |
          source ./.emsdk/emsdk_env.sh
          embuilder build zlib

      - name: Build asm.js core
        working-directory: emulatorjs-build
        env:
          EMMAKEN_CFLAGS: -sUSE_ZLIB=1
        run: |
          source ./.emsdk/emsdk_env.sh
          bash build.sh --core=${{ matrix.core }}

      - name: Collect asm.js artifacts
        working-directory: emulatorjs-build
        run: |
          mkdir -p asmjs-artifacts/${{ matrix.core }}
          echo "Files in output:"
          find output -maxdepth 2 -type f -print | sort || true
          echo "Files in EmulatorJS/data/cores:"
          find compile/RetroArch/EmulatorJS/data/cores -maxdepth 1 -type f -print | sort || true
          core_files="$(find output compile/RetroArch/EmulatorJS/data/cores -maxdepth 2 -type f \( \
            -name '${{ matrix.core }}.zip' -o \
            -name '${{ matrix.core }}-wasm.data' -o \
            -name '${{ matrix.core }}-legacy-wasm.data' -o \
            -name '${{ matrix.core }}-thread-wasm.data' -o \
            -name '${{ matrix.core }}-thread-legacy-wasm.data' \
          \) -print 2>/dev/null | sort -u)"
          if [ -z "$core_files" ]; then
            echo "No compiled core artifacts were found for ${{ matrix.core }}"
            if [ -d output/logs ]; then
              echo "Compile log tail:"
              tail -n 120 output/logs/${{ matrix.core }}-compile.log 2>/dev/null || true
              echo "Emake log tail:"
              tail -n 160 output/logs/${{ matrix.core }}-emake.log 2>/dev/null || true
            fi
            exit 1
          fi
          while IFS= read -r file; do
            cp "$file" asmjs-artifacts/${{ matrix.core }}/
          done <<EOF
          $core_files
          EOF
          if [ -d output/logs ]; then
            mkdir -p asmjs-artifacts/${{ matrix.core }}/logs
            cp output/logs/${{ matrix.core }}-* asmjs-artifacts/${{ matrix.core }}/logs/ 2>/dev/null || true
          fi
          if [ -d output/reports ]; then
            mkdir -p asmjs-artifacts/${{ matrix.core }}/reports
            cp output/reports/${{ matrix.core }}.json asmjs-artifacts/${{ matrix.core }}/reports/ 2>/dev/null || true
          fi
          find asmjs-artifacts/${{ matrix.core }} -maxdepth 1 -type f \( -name '*.zip' -o -name '*.data' \) | grep -q .

      - name: Upload core artifact
        uses: actions/upload-artifact@v4
        with:
          name: emulatorjs-asmjs-${{ matrix.platform }}-${{ matrix.core }}
          path: emulatorjs-build/asmjs-artifacts/${{ matrix.core }}
          if-no-files-found: error
          retention-days: 14
